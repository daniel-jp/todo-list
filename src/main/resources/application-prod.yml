spring:

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: false

    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT}

application:
  security:
    jwt:
      secret-key: 504E635266556A586E3272357538782F413F4428472B4B6250645367566B6570
      expiration: JWT_EXPIRATION:36000000